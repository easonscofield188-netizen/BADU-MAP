<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>百度地图地址选择组件示例</title>
  <link rel="stylesheet" href="./baidu-map-address-picker.css?v=202604232105" charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 16px 12px;
      background: #f6f6f6;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: #333;
      font-size: 14px;
    }

    .demo-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 12px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.03);
    }

    .demo-title {
      font-size: 17px;
      font-weight: 700;
      color: #222;
      margin-bottom: 14px;
    }

    .demo-field {
      margin-bottom: 12px;
    }

    .demo-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .demo-value {
      min-height: 42px;
      border: 1px solid #ececec;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 20px;
      color: #333;
      word-break: break-all;
    }

    .demo-placeholder {
      color: #b8b8b8;
    }

    .demo-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #ff6767 0%, #ff3b30 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="demo-card">
      <div class="demo-title">个人信息</div>

      <div class="demo-field">
        <div class="demo-label">常住地址</div>
        <div class="demo-value">
          <span v-if="form.fullAddress">{{ form.fullAddress }}</span>
          <span v-else class="demo-placeholder">请点击按钮选择常住地址</span>
        </div>
      </div>

      <div class="demo-field">
        <div class="demo-label">省 / 市 / 区</div>
        <div class="demo-value">{{ form.province || '-' }} {{ form.city || '' }} {{ form.district || '' }}</div>
      </div>

      <div class="demo-field">
        <div class="demo-label">门牌号 / 详细补充地址</div>
        <div class="demo-value">{{ form.detailAddress || '-' }}</div>
      </div>

      <div class="demo-field">
        <div class="demo-label">经纬度</div>
        <div class="demo-value">{{ form.lng || '-' }} {{ form.lat ? (' / ' + form.lat) : '' }}</div>
      </div>

      <button class="demo-btn" @click="openAddressPicker">选择常住地址</button>
    </div>

    <baidu-map-address-picker
      ref="addressPicker"
      @confirm="handleAddressConfirm"
    ></baidu-map-address-picker>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>
  <script src="./allianity-city-data.js?v=202604232036" charset="UTF-8"></script>
  <script src="https://api.map.baidu.com/api?v=1.0&type=webgl&ak=HgjE1KgxQkaoM0G66LUd1kQ1TpPBpQg5"></script>
  <script src="./baidu-map-address-picker.js?v=202604232105" charset="UTF-8"></script>
  <script>
    new Vue({
      el: '#app',
      data: function () {
        return {
          form: {
            province: '',
            city: '',
            district: '',
            street: '',
            streetNumber: '',
            fullAddress: '',
            detailAddress: '',
            lng: '',
            lat: ''
          }
        };
      },
      methods: {
        openAddressPicker: function () {
          this.$refs.addressPicker.open();
        },
        handleAddressConfirm: function (payload) {
          this.form = Object.assign({}, this.form, payload || {});
        }
      }
    });
  </script>
</body>
</html>
